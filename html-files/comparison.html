<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/mclaren.png" type="image/png">
    <title>McLaren Senna - Comparison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body id="page-top">

<!-- Navigation -->
<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
    <div class="container">
        <div class="navbar-brand-container">
            <a class="navbar-brand" href="index.html">Homepage</a>
            <a class="navbar-brand" href="history.html">History</a>
            <a class="navbar-brand" href="data.html">Data</a>
            <a class="navbar-brand" href="gallery.html">Gallery</a>
            <a class="navbar-brand" id="currentPage" href="comparison.html">Comparison</a>
        </div>
    </div>
</nav>

<section class="section-dark" id="comparison">
    <div class="container text-center mt-5 pt-5 margin-comparasion">

        <h1>Compare Cars with McLaren Senna</h1>
        <p>Car data is provided by <a href="https://carapi.app/features/vehicle-csv-download" target="_blank">CarAPI</a>.</p>

        <!-- Make Filter -->
        <div class="mb-3">
            <select id="brandFilter" class="form-select">
                <option value="">All Makes</option>
            </select>
        </div>

        <!-- Car Dropdown -->
        <div class="mb-3">
            <select id="carDropdown" class="form-select">
                <option value="">Select a car...</option>
            </select>
        </div>

        <!-- Comparison Table -->
        <div id="compareData" class="mt-2"></div>

        <!-- ═══════════════════════════════════════════════
             DRAG RACE
             ═══════════════════════════════════════════════ -->
        <div id="raceSection" class="race-section mt-4" style="display:none;">

            <!-- Header -->
            <div class="race-header">
                <span class="race-title">0 – 100 km/h <span class="race-title-accent">Drag Race</span></span>
            </div>

            <!-- Track -->
            <div class="race-track-wrapper">
                <!-- Lane 1 – Rival -->
                <div class="race-lane">
                    <div class="lane-label" id="lane-car-label">Rival</div>
                    <div class="lane-road">
                        <div class="road-lines"></div>
                        <div class="race-car" id="raceCar">
                            <div class="exhaust" id="exhaust-car"></div>
                            <svg viewBox="0 0 120 42" xmlns="http://www.w3.org/2000/svg">
                                <rect x="8"  y="18" width="100" height="18" rx="4" fill="#00A4EF"/>
                                <path d="M30 18 L38 6 L82 6 L92 18 Z" fill="#007bbf"/>
                                <path d="M40 17 L46 8 L74 8 L80 17 Z" fill="rgba(180,230,255,0.35)"/>
                                <circle cx="28" cy="36" r="7" fill="#111"/>
                                <circle cx="28" cy="36" r="3.5" fill="#00A4EF"/>
                                <circle cx="90" cy="36" r="7" fill="#111"/>
                                <circle cx="90" cy="36" r="3.5" fill="#00A4EF"/>
                                <ellipse cx="108" cy="24" rx="4" ry="3" fill="rgba(255,255,200,0.6)"/>
                                <rect x="8" y="24" width="100" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
                            </svg>
                        </div>
                    </div>
                    <div class="lane-time car-time-badge" id="time-car">0.00s</div>
                </div>

                <!-- Lane 2 – McLaren Senna -->
                <div class="race-lane">
                    <div class="lane-label">McLaren Senna</div>
                    <div class="lane-road">
                        <div class="road-lines"></div>
                        <div class="race-car" id="raceSenna">
                            <div class="exhaust" id="exhaust-senna"></div>
                            <svg viewBox="0 0 120 42" xmlns="http://www.w3.org/2000/svg">
                                <rect x="8"  y="18" width="100" height="18" rx="4" fill="#ff8700"/>
                                <path d="M28 18 L36 5 L84 5 L94 18 Z" fill="#cc6a00"/>
                                <path d="M40 17 L46 7 L74 7 L82 17 Z" fill="rgba(255,200,100,0.3)"/>
                                <circle cx="28" cy="36" r="7" fill="#111"/>
                                <circle cx="28" cy="36" r="3.5" fill="#ff8700"/>
                                <circle cx="90" cy="36" r="7" fill="#111"/>
                                <circle cx="90" cy="36" r="3.5" fill="#ff8700"/>
                                <ellipse cx="108" cy="24" rx="4" ry="3" fill="rgba(255,255,200,0.7)"/>
                                <rect x="8"  y="24" width="100" height="3" rx="1" fill="rgba(0,0,0,0.25)"/>
                                <rect x="10" y="12" width="6"   height="8" rx="1" fill="#cc6a00"/>
                                <rect x="6"  y="11" width="14"  height="2" rx="1" fill="#cc6a00"/>
                            </svg>
                        </div>
                    </div>
                    <div class="lane-time senna-time-badge" id="time-senna">0.00s</div>
                </div>

            </div><!-- /race-track-wrapper -->

            <!-- Start button + result -->
            <div class="race-controls">
                <button id="raceBtn" class="btn-race" onclick="startRace()">
                    <span class="race-btn-icon">&#9654;</span> START RACE
                </button>
                <div id="raceResult" class="race-result" style="display:none;"></div>
            </div>

            <!-- Estimated 0-100 info cards -->
            <div class="race-info-row mt-3" id="raceInfoRow" style="display:none;">
                <div class="race-info-card car-info-card">
                    <span class="info-label" id="info-car-name">Rival</span>
                    <span class="info-time" id="info-car-time">–</span>
                    <span class="info-unit">est. 0–100 km/h</span>
                </div>
                <div class="race-info-vs">VS</div>
                <div class="race-info-card senna-info-card">
                    <span class="info-label">McLaren Senna</span>
                    <span class="info-time" id="info-senna-time">–</span>
                    <span class="info-unit">est. 0–100 km/h</span>
                </div>
            </div>

        </div><!-- /raceSection -->

    </div>
</section>

<footer>
    <p>McLaren fan website</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="../js/comparison.js"></script>

</body>
</html>
